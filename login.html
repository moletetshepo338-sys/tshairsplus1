<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login/Register - T's Hairs Plus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-analytics.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCV7eKMNGS-8yTFH71LHdUa7DBOgdw-M38",
  authDomain: "store-web-beadb.firebaseapp.com",
  projectId: "store-web-beadb",
  storageBucket: "store-web-beadb.appspot.com",
  messagingSenderId: "878106383556",
  appId: "1:878106383556:web:0eda586be105812d896591",
  measurementId: "G-5TS1981CQP"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

// Make global
window.auth = auth;
window.db = db;

// Switch forms
window.showRegister = () => {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";
};
window.showLogin = () => {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerBox").style.display = "none";
};

// REGISTER
window.register = async () => {
  const name = document.getElementById("r_name").value;
  const email = document.getElementById("r_email").value;
  const phone = document.getElementById("r_phone").value;
  const pass = document.getElementById("r_pass").value;

  if(!name || !email || !phone || !pass){
    alert("💖 Please fill all fields!");
    return;
  }

  try{
    document.getElementById("status").innerText = "Creating account...";
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);

    // Save in Firestore
    await setDoc(doc(db,"users", userCred.user.uid), {
      name: name,
      email: email,
      phone: phone,
      role: "client",
      createdAt: new Date()
    });

    alert("✅ Account created!");
    document.getElementById("status").innerText = "";
    showLogin();

  } catch(e){
    document.getElementById("status").innerText = "";
    alert("❌ " + e.message);
  }
};

// LOGIN
window.login = async () => {
  const email = document.getElementById("l_email").value;
  const pass = document.getElementById("l_pass").value;

  if(!email || !pass){
    alert("💖 Enter your login details");
    return;
  }

  try{
    document.getElementById("status").innerText = "Logging in...";
    const userCred = await signInWithEmailAndPassword(auth, email, pass);
    const uid = userCred.user.uid;

    const userRef = doc(db,"users",uid);
    const snap = await getDoc(userRef);

    if(!snap.exists()){
      alert("❌ User not found in database");
      return;
    }

    const role = snap.data().role;
    document.getElementById("status").innerText = "";

    if(role === "admin"){
      window.location = "admin_home.html";
    } else {
      window.location = "client_home.html";
    }

  } catch(e){
    document.getElementById("status").innerText = "";
    alert("❌ " + e.message);
  }
};
</script>

<style>
body{
  margin:0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom,#ffe4ec,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:360px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  text-align:center;
}

.logo{
  font-size:36px;
  font-weight:bold;
  color:#ff1493;
  font-family: 'Comic Sans MS', cursive;
  margin-bottom:5px;
}

.brand{
  font-size:16px;
  color:#888;
  margin-bottom:20px;
}

h3{
  color:#ff1493;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  background:#ff1493;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:#ff69b4;
}

.link{
  color:#ff1493;
  margin-top:10px;
  display:block;
  cursor:pointer;
  font-size:14px;
}

#status{
  margin-top:12px;
  color:#ff1493;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">👑 T</div>
  <div class="brand">T's Hairs Plus</div>

  <!-- LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>
    <input id="l_email" placeholder="Email">
    <input id="l_pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <span class="link" onclick="showRegister()">Don't have an account? Register</span>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" style="display:none;">
    <h3>Register</h3>
    <input id="r_name" placeholder="Full Name">
    <input id="r_email" placeholder="Email">
    <input id="r_phone" placeholder="SA Phone Number (0812345678)">
    <input id="r_pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <span class="link" onclick="showLogin()">Already have an account? Login</span>
  </div>

  <div id="status"></div>

</div>

</body>
</html>
