<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clients Homepage - T's Hairs Plus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial,sans-serif;
  background:#fff0f5;
  color:#333;
}

/* Header */
header{
  background:#ff69b4;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
header .logo{
  display:flex;
  align-items:center;
}
header .logo img{
  width:50px;
  height:50px;
  margin-right:10px;
  border-radius:10px;
}
header .logo h1{
  font-family:'Comic Sans MS', cursive;
  font-size:22px;
  margin:0;
}
nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
nav button{
  padding:8px 12px;
  border:none;
  background:#ff1493;
  color:white;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
nav button:hover{
  background:#ff69b4;
}

/* DRAWER */
.menu-btn{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border:none;
  font-size:22px;
  padding:8px 12px;
  border-radius:12px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.menu-btn:hover{
  transform:scale(1.1);
}

.drawer{
  position:fixed;
  top:0;
  right:-300px;
  width:260px;
  height:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  transition:0.4s ease;
  z-index:1000;
  padding:20px;
}
.drawer.open{
  right:0;
}
.drawer-header{
  text-align:center;
  margin-bottom:20px;
}
.drawer-header img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid #ff69b4;
}
.drawer-header p{
  margin-top:10px;
  font-weight:bold;
  color:#333;
}
.drawer button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#ff1493;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.drawer button:hover{
  background:#ff69b4;
  transform:translateX(-5px);
}
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:0 10px;
}

.product-feed{
  display:flex;
  flex-direction:column;
  gap:30px;
}

.product-card{
  background:white;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  padding:15px;
}

.product-card h3{
  color:#ff1493;
  margin:5px 0;
}

.product-card p{
  margin:5px 0;
  font-weight:bold;
}

.main-image{
  width:100%;
  max-height:400px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:10px;
}

.thumbnail-images{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.thumbnail-images img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
.thumbnail-images img:hover{
  transform:scale(1.1);
}

.reactions{
  margin-top:5px;
  font-size:16px;
  color:#ff1493;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  font-weight:bold;
}

/* Fullscreen gallery */
#gallery-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
#gallery-overlay img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
  box-shadow:0 0 25px #fff;
}
#gallery-overlay .close-btn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

// Firebase setup
const firebaseConfig = {
  apiKey: "AIzaSyCV7eKMNGS-8yTFH71LHdUa7DBOgdw-M38",
  authDomain: "store-web-beadb.firebaseapp.com",
  projectId: "store-web-beadb",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserUid = null;
onAuthStateChanged(auth, user => { 
  currentUserUid = user ? user.uid : null;
  if(user) document.getElementById("email").innerText = user.email;
});

// Drawer functions
window.openDrawer = ()=>{
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").style.display = "block";
};
window.closeDrawer = ()=>{
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").style.display = "none";
};
window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

// Open fullscreen gallery
window.viewImage = (url)=>{
  const overlay = document.getElementById("gallery-overlay");
  overlay.style.display = "flex";
  overlay.querySelector("img").src = url;
};
window.closeGallery = ()=>document.getElementById("gallery-overlay").style.display="none";

// React once per user per product
window.react = async (productId, spanElem)=>{
  if(!currentUserUid){ alert("Login to react!"); return; }

  const productRef = doc(db,"products",productId);
  const snapshot = await getDoc(productRef);
  const p = snapshot.data();

  let reactions = p.reactions || [];
  reactions = reactions.filter(uid => uid !== currentUserUid);
  reactions.push(currentUserUid);
  await updateDoc(productRef,{reactions});
  spanElem.innerText = `❤️ ${reactions.length} (You)`;
};

// Render products live
const feedContainer = document.getElementById("product-feed");
onSnapshot(collection(db,"products"), snapshot=>{
  feedContainer.innerHTML="";
  const products = snapshot.docs.map(d=>({id:d.id,...d.data()}));
  products.sort(()=>Math.random()-0.5); // shuffle

  products.forEach(p=>{
    const images = p.images || [p.imageUrl];
    const reactions = p.reactions || [];

    const card = document.createElement("div");
    card.className="product-card";

    const mainImage = `<img class="main-image" src="${images[0]}" onclick="viewImage('${images[0]}')">`;
    const thumbnails = images.slice(1).map(url=>`<img src="${url}" onclick="viewImage('${url}')">`).join("");
    const thumbHtml = thumbnails ? `<div class="thumbnail-images">${thumbnails}</div>` : "";
    const reacted = currentUserUid && reactions.includes(currentUserUid);
    const reactHtml = `<div class="reactions"><span onclick="react('${p.id}', this)">❤️ ${reactions.length}${reacted?' (You)':''}</span></div>`;

    card.innerHTML = `
      <h3>${p.name}</h3>
      <p>R${p.price}</p>
      <p>${p.description}</p>
      ${mainImage}
      ${thumbHtml}
      ${reactHtml}
    `;
    feedContainer.appendChild(card);
  });
});
</script>

</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <h1>T's Hairs Plus</h1>
  </div>
  <nav>
    <button onclick="window.location='client_home.html'">Home</button>
    <button onclick="window.location='client_product.html'">Purchase</button>
    <button onclick="window.location='client_booking.html'">Booking</button>
    <button onclick="window.location='client_about.html'">About Us</button>
    <button class="menu-btn" onclick="openDrawer()">☰</button>
  </nav>
</header>

<div class="container">
  <h2>Admire the Admin’s Work 💖</h2>
  <div id="product-feed" class="product-feed"></div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <img src="logo.png" alt="Profile">
    <p id="email">Guest</p>
  </div>
  <button onclick="location='client_profile.html'">👤 Profile Settings</button>
  <button onclick="location='client_appointments.html'">📅 Booking Appointments</button>
  <button onclick="location='client_orders.html'">📦 Track Orders</button>
  <button onclick="location ='index.html'">🚪 Logout</button>
</div>
<div id="overlay" class="overlay" onclick="closeDrawer()"></div>

<!-- Fullscreen gallery -->
<div id="gallery-overlay" onclick="closeGallery()">
  <span class="close-btn">&times;</span>
  <img src="" alt="Full view">
</div>

</body>
</html>
