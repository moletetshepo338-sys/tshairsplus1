<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T's Hair Plug | Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Montserrat', sans-serif;
  background: #fff0f5;
  color: #333;
}

/* Banner */
.ads {
  background: #ffb6c1;
  color: white;
  padding: 12px 20px;
  font-weight: bold;
  font-size: 18px;
  position: relative;
  text-align: center;
}
.login-btn {
  position: absolute;
  top: 50%;
  right: 20px;
  transform: translateY(-50%);
  background: #ff1493;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
  transition: transform 0.2s ease, background 0.2s ease;
}
.login-btn:hover {
  transform: translateY(-50%) scale(1.05);
  background: #ff69b4;
}

/* Header */
header {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 20px 30px;
  background: white;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 99;
}
.logo-container {
  display: flex;
  align-items: center;
  cursor: pointer;
}
.logo-container img {
  height: 90px;
  margin-right: 15px;
  border-radius: 15px;
  border: 2px solid #ff69b4;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.logo-container h1 {
  margin: 0;
  font-family: 'Pacifico', cursive;
  color: #ff69b4;
  font-size: 42px;
  letter-spacing: 1px;
}
.main-nav {
  display: flex;
  gap: 12px;
  margin-left: 30px;
  flex-wrap: wrap;
  align-items: center;
}
.main-nav button {
  padding: 10px 18px;
  font-size: 15px;
  border: none;
  background: #ff69b4;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
  transition: background 0.3s ease, transform 0.2s ease;
}
.main-nav button:hover {
  background: #ff1493;
  transform: scale(1.05);
}

/* Booking Section */
.booking-container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  background:white;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  text-align:center;
}
.booking-container h2 {
  color:#ff1493;
  margin-bottom:20px;
}
.booking-container p {
  margin-bottom:15px;
}
.booking-container input, .booking-container select, .booking-container button {
  padding: 10px;
  margin: 8px 5px;
  font-size: 16px;
  border-radius: 8px;
  border:1px solid #ddd;
}
.booking-container button {
  background:#ff1493;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
  transition: 0.3s;
}
.booking-container button:hover {
  background:#ff69b4;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: white;
  color: #ff69b4;
  font-weight: bold;
  margin-top: 20px;
  box-shadow: 0 -3px 6px rgba(0,0,0,0.05);
}

@media(max-width:768px) {
  .main-nav { margin-left:10px; gap:8px; }
  .main-nav button { padding:6px 12px; font-size:13px; }
  .logo-container img { height:60px; }
  .logo-container h1 { font-size:32px; }
  .booking-container input, .booking-container select, .booking-container button { width: 90%; }
}
</style>

<script>
function handleBookingSubmit() {
  alert("Please login or register to book a service!");
  window.location = 'login.html';
}
</script>
</head>
<body>

<!-- Special Offer Banner -->
<div class="ads">
  💖 Special Offer! Get 10% off on your first hair or nail treatment! 💖
  <button class="login-btn" onclick="window.location='login.html'">Login / Sign Up</button>
</div>

<!-- Header -->
<header>
  <div class="logo-container" onclick="window.location='index.html'">
    <img src="logo.png" alt="T's Hair Plug Logo">
    <h1>T's Hair Plug</h1>
  </div>
  <div class="main-nav">
    <button onclick="window.location='index.html'">Home</button>
    <button onclick="window.location='products.html'">Products</button>
    <button onclick="handleBookingSubmit()">Booking</button>
    <button onclick="window.location='about.html'">About Us</button>
  </div>
</header>

<!-- Booking Section -->
<div class="booking-container">
  <h2>Book Your Appointment 💖</h2>
  <p>Fill the details below to request a booking</p>
  <form id="booking-form">
    <input type="text" placeholder="Full Name" required><br>
    <input type="email" placeholder="Email" required><br>
    <select required>
      <option value="">Select Service</option>
      <option value="Hair Styling">Hair Styling</option>
      <option value="Wig Installation">Wig Installation</option>
      <option value="Nail Service">Nail Service</option>
    </select><br>
    <input type="date" required><br>
    <button type="button" onclick="handleBookingSubmit()">Submit Booking</button>
  </form>
  <p style="margin-top:10px; font-size:14px;">*Extra charges may apply for selected dates or special services 💖</p>
</div>

<footer>
  © 2026 T's Hair Plug | All rights reserved
</footer>

</body>
</html>
