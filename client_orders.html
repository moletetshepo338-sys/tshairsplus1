<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders 💖 - T's Hairs Plus</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#fff0f5;
  color:#333;
}

.container{
  max-width:700px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
}

h2{
  text-align:center;
  color:#ff1493;
  margin-bottom:15px;
}

.back-btn{
  background:#ffe4ec;
  color:#ff1493;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-bottom:15px;
  transition:0.2s;
}
.back-btn:hover{
  background:#ff1493;
  color:white;
}

.filter-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:15px;
  flex-wrap:wrap;
}
.filter-buttons button{
  background:#ffe4ec;
  color:#ff1493;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}
.filter-buttons button:hover{
  background:#ff1493;
  color:white;
}

.order-card{
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background:white;
  border-left:4px solid #ff1493;
  box-shadow:0 4px 8px rgba(0,0,0,0.08);
  transition: transform 0.2s;
}
.order-card:hover{
  transform: translateY(-2px);
}

.order-card img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  margin-right:10px;
}

.order-info{
  display:flex;
  gap:10px;
  align-items:center;
}

.order-details{
  flex:1;
}
.order-details p{
  margin:3px 0;
}

.status{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h2>My Orders 💖</h2>

  <div class="filter-buttons">
    <button onclick="filterOrders('all')">1. All</button>
    <button onclick="filterOrders('Pending')">2. Pending</button>
    <button onclick="filterOrders('Confirmed')">3. Confirmed</button>
    <button onclick="filterOrders('Shipped')">4. Shipped</button>
    <button onclick="filterOrders('Delivered')">5. Delivered</button>
    <button onclick="filterOrders('Cancelled')">6. Cancelled</button>
  </div>

  <div id="orders">
    <p style="text-align:center; color:#ff1493;">Loading your orders...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCV7eKMNGS-8yTFH71LHdUa7DBOgdw-M38",
  authDomain: "store-web-beadb.firebaseapp.com",
  projectId: "store-web-beadb",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allOrders = [];

const container = document.getElementById("orders");

onAuthStateChanged(auth, user=>{
  if(user){
    currentUser = user;
    console.log("Logged in UID:", user.uid);
    loadOrders();
  } else {
    alert("You must login first!");
    window.location.href = "login.html";
  }
});

function loadOrders(){
  const ordersRef = collection(db,"orders");

  onSnapshot(ordersRef, snapshot=>{
    const userOrders = [];
    snapshot.forEach(doc=>{
      const data = doc.data();
      if(data.uid === currentUser.uid){
        userOrders.push(data);
      }
    });

    // Sort by timestamp descending
    userOrders.sort((a,b)=>{
      const tA = a.timestamp?.toDate ? a.timestamp.toDate().getTime() : 0;
      const tB = b.timestamp?.toDate ? b.timestamp.toDate().getTime() : 0;
      return tB - tA;
    });

    allOrders = userOrders;
    displayOrders(allOrders);
  });
}

function displayOrders(ordersData){
  container.innerHTML="";
  
  if(ordersData.length===0){
    container.innerHTML="<p style='text-align:center; color:#ff1493;'>You have no orders yet 💖</p>";
    return;
  }

  ordersData.forEach((o, index)=>{
    let color="orange";
    if(o.status==="Confirmed") color="blue";
    if(o.status==="Shipped") color="purple";
    if(o.status==="Delivered") color="green";
    if(o.status==="Cancelled") color="red";

    const div = document.createElement("div");
    div.className="order-card";
    div.innerHTML=`
      <div class="order-info">
        ${o.proof ? `<img src="${o.proof}" alt="Proof">` : ""}
        <div class="order-details">
          <p><b>${index + 1}. ${o.product}</b></p>
          <p>Price: R${o.price}</p>
          <p>Status: <span class="status" style="color:${color}">${o.status}</span></p>
          <p>Date: ${o.timestamp?.toDate ? o.timestamp.toDate().toLocaleString() : "N/A"}</p>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Filter orders
window.filterOrders = (status) => {
  if(status==="all") displayOrders(allOrders);
  else displayOrders(allOrders.filter(o => o.status === status));
}

window.goBack = ()=>{
  window.location.href="client_home.html";
}
</script>

</body>
</html>
